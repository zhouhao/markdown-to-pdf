<?xml version="1.0" encoding="UTF-8"?>
<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Markdown to PDF logo">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="128" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#grad)" filter="url(#softShadow)"/>

  <!-- Arrow (MD -> PDF) -->
  <g stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.95">
    <path d="M22 64 H84"/>
    <path d="M74 52 L98 64 L74 76"/>
  </g>

  <!-- Labels -->
  <g fill="#FFFFFF" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
    <text x="18" y="40" font-size="26" font-weight="800" letter-spacing="0.5">MD</text>
    <text x="66" y="108" font-size="24" font-weight="900" letter-spacing="0.6">PDF</text>
  </g>

  <!-- Subtle foreground gloss -->
  <path d="M28 16 H100 a12 12 0 0 1 12 12 V44 C84 32 60 30 28 44 V28 a12 12 0 0 1 12-12 Z" fill="#FFFFFF" opacity="0.06"/>
</svg>
